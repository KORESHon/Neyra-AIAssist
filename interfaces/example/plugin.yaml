id: example
name: Example Plugin
description: Minimal template plugin for Neyra Plugin SDK.
version: "0.1.0"
enabled: false

# resident   — main_script загружается при старте ядра (долгоживущие интерфейсы: Discord и т.п.)
# on_demand  — только реестр метаданных; код подгружается по вызову ядра/пользователя
#              (кастомный поиск, музыка, тяжёлые API — чтобы не раздувать процесс заранее)
lifecycle: on_demand
cli_modes: []

main_script: core/main.py
entry_mode: service
events: []
commands: []
permissions: []
